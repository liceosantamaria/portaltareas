  if(!examen)return 0;let p=0;
  examen.multiple.forEach(q=>{if(r.multiple?.[q.id]===q.correcta)p++;});
  examen.vf.forEach(q=>{if(r.vf?.[q.id]===q.correcta)p++;});
  examen.completar.preguntas.forEach(q=>{if((r.completar?.[q.id]||"").toLowerCase().trim()===q.correcta.toLowerCase())p++;});
  return p;
}
function maxAuto(examen){if(!examen)return 0;return examen.multiple.length+examen.vf.length+examen.completar.preguntas.length;}

const JB_URL=()=>`https://api.jsonbin.io/v3/b/${window.JSONBIN_BIN}`;
const JB_H=()=>({"Content-Type":"application/json","X-Master-Key":window.JSONBIN_KEY,"X-Bin-Versioning":"false"});
async function jbGet(){const g=await fetch(JB_URL(),{headers:JB_H()});const d=await g.json();return d.record||{respuestas:[],estado:{}};}
async function jbSet(data){await fetch(JB_URL(),{method:"PUT",headers:JB_H(),body:JSON.stringify(data)});}
async function guardarRespuesta(resp){try{const d=await jbGet();const arr=Array.isArray(d.respuestas)?d.respuestas:[];arr.push(resp);await jbSet({...d,respuestas:arr});return true;}catch(e){console.error(e);return false;}}
async function leerEstado(){try{const d=await jbGet();return d.estado||{};}catch(e){return{};}}
async function guardarEstado(estado){try{const d=await jbGet();await jbSet({...d,estado});}catch(e){console.error(e);}}
async function leerRespuestas(){try{const d=await jbGet();return Array.isArray(d.respuestas)?d.respuestas:[];}catch(e){return[];}}

const btn=(e={})=>({background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:10,padding:"9px 20px",color:"#fff",cursor:"pointer",fontSize:13,...e});
const card={background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:12,padding:16,marginBottom:12};

function useTimer(s){
  const [t,setT]=useState(s);
  useEffect(()=>{const x=setInterval(()=>setT(p=>p>0?p-1:0),1000);return()=>clearInterval(x);},[]);
  const mm=String(Math.floor(t/60)).padStart(2,"0"),ss=String(t%60).padStart(2,"0");
  return{mm,ss,color:t<300?"#ff5050":t<600?"#ffaa00":"#00ff88",agotado:t<=0};
}

function TabsBar({tabs,sec,setSec,color}){return(<div style={{display:"flex",gap:4,padding:"10px 20px 0",borderBottom:"1px solid rgba(255,255,255,0.08)",overflowX:"auto"}}>{tabs.map((t,i)=><button key={i} onClick={()=>setSec(i)} style={{background:sec===i?"rgba(0,0,0,0.3)":"transparent",border:sec===i?`1px solid ${color}`:"1px solid transparent",color:sec===i?color:"rgba(255,255,255,0.5)",borderRadius:"8px 8px 0 0",padding:"7px 12px",cursor:"pointer",fontSize:12,fontWeight:sec===i?700:400,whiteSpace:"nowrap"}}>{i+1}. {t}</button>)}</div>);}

function PregMultiple({q,qi,sel,onSel,color}){return(<div style={card}><div style={{fontSize:14,marginBottom:10,lineHeight:1.5,whiteSpace:"pre-line"}}><span style={{fontWeight:700,color}}>{qi+1}.</span> {q.txt}</div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>{q.opts.map((o,oi)=><button key={oi} onClick={()=>onSel(oi)} style={{background:sel===oi?"rgba(0,212,255,0.15)":"rgba(255,255,255,0.05)",border:sel===oi?"1px solid #00d4ff":"1px solid rgba(255,255,255,0.1)",borderRadius:8,padding:"8px 12px",color:sel===oi?"#00d4ff":"rgba(255,255,255,0.8)",cursor:"pointer",fontSize:12,textAlign:"left",display:"flex",gap:6}}><span style={{fontWeight:700,flexShrink:0}}>{["A","B","C","D"][oi]})</span>{o}</button>)}</div></div>);}
function PregVF({q,qi,sel,onSel}){return(<div style={{...card,display:"flex",justifyContent:"space-between",alignItems:"center",gap:12}}><div style={{fontSize:13,lineHeight:1.5,flex:1}}><span style={{fontWeight:700,color:"#a78bff"}}>{qi+1}.</span> {q.txt}</div><div style={{display:"flex",gap:8,flexShrink:0}}>{[true,false].map(v=><button key={String(v)} onClick={()=>onSel(v)} style={{background:sel===v?(v?"rgba(0,255,136,0.2)":"rgba(255,80,80,0.2)"):"rgba(255,255,255,0.07)",border:sel===v?(v?"1px solid #00ff88":"1px solid #ff5050"):"1px solid rgba(255,255,255,0.1)",borderRadius:8,padding:"7px 14px",color:sel===v?(v?"#00ff88":"#ff5050"):"rgba(255,255,255,0.6)",cursor:"pointer",fontWeight:700,fontSize:13}}>{v?"V":"F"}</button>)}</div></div>);}
function BancoPalabras({banco}){return(<div style={{background:"rgba(255,255,255,0.04)",borderRadius:10,padding:12,marginBottom:14,border:"1px dashed rgba(255,255,255,0.2)"}}><div style={{fontSize:11,color:"rgba(255,255,255,0.5)",marginBottom:8,fontWeight:700}}>BANCO DE PALABRAS:</div><div style={{display:"flex",flexWrap:"wrap",gap:8}}>{banco.map(w=><span key={w} style={{background:"rgba(0,212,255,0.1)",border:"1px solid rgba(0,212,255,0.2)",borderRadius:6,padding:"3px 10px",fontSize:12,color:"#00d4ff"}}>{w}</span>)}</div></div>);}
function PregCompletar({q,qi,val,onChange}){return(<div style={card}><div style={{fontSize:13,lineHeight:2,display:"flex",flexWrap:"wrap",alignItems:"center",gap:4}}><span style={{fontWeight:700,color:"#a78bff"}}>{qi+1}.</span><span>{q.pre}</span><input value={val} onChange={e=>onChange(e.target.value)} placeholder="escribe aquí..." style={{background:"rgba(255,255,255,0.08)",border:"none",borderBottom:"2px solid rgba(0,212,255,0.5)",padding:"2px 8px",color:"#00d4ff",fontSize:13,outline:"none",minWidth:160,borderRadius:"4px 4px 0 0"}}/><span>{q.post}</span></div></div>);}
function NavBotones({sec,setSec,max}){return(<div style={{display:"flex",justifyContent:"space-between",marginTop:16}}>{sec>0&&<button onClick={()=>setSec(s=>s-1)} style={btn()}>← Anterior</button>}{sec<max&&<button onClick={()=>setSec(s=>s+1)} style={{...btn({marginLeft:"auto"}),background:"rgba(0,212,255,0.15)",border:"1px solid rgba(0,212,255,0.3)",color:"#00d4ff",fontWeight:600}}>Siguiente →</button>}</div>);}
function BotonEnviar({confirm,setConfirm,enviando,enviar}){
  if(!confirm)return(<button onClick={()=>setConfirm(true)} style={{width:"100%",marginTop:8,background:"linear-gradient(90deg,#00d4ff,#7b2ff7)",border:"none",borderRadius:12,padding:14,color:"#fff",fontWeight:700,fontSize:15,cursor:"pointer"}}>Enviar examen 📨</button>);
  return(<div style={{background:"rgba(255,170,0,0.1)",border:"1px solid rgba(255,170,0,0.4)",borderRadius:12,padding:16,textAlign:"center",marginTop:8}}><div style={{fontSize:14,color:"#ffaa00",marginBottom:12}}>¿Confirmas el envío? No podrás modificar tus respuestas.</div><div style={{display:"flex",gap:10,justifyContent:"center"}}><button onClick={()=>setConfirm(false)} style={btn()}>Revisar primero</button><button onClick={enviar} disabled={enviando} style={{background:"#00ff88",border:"none",borderRadius:8,padding:"9px 20px",color:"#000",fontWeight:700,cursor:"pointer",fontSize:13}}>{enviando?"Enviando...":"Sí, enviar ✓"}</button></div></div>);
}
function Enviado({nombre}){return(<div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0a0a1a,#0a1628)",display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{textAlign:"center",padding:40}}><div style={{fontSize:60,marginBottom:16}}>✅</div><h2 style={{fontSize:24,fontWeight:800,color:"#00ff88",marginBottom:8}}>¡Examen enviado!</h2><p style={{color:"rgba(255,255,255,0.6)",marginBottom:6}}>Tus respuestas fueron guardadas, {nombre.split(" ")[0]}.</p><p style={{fontSize:13,color:"rgba(255,255,255,0.4)"}}>Tu catedrático revisará y publicará tu nota pronto.</p></div></div>);}

function ExamenPractico({nombre,cursoId,tipoExamen,onEnviar}){
  const c=getCurso(cursoId);
  const examen=EXAM_MAP[cursoId]?.[tipoExamen];
  const [respuestas,setRespuestas]=useState({});
  const [enviado,setEnviado]=useState(false);
  const [confirm,setConfirm]=useState(false);
  const [enviando,setEnviando]=useState(false);
  const {mm,ss,color:tc,agotado}=useTimer(examen?.tiempo||50*60);
  useEffect(()=>{if(agotado&&!enviado)enviar();},[agotado]);

  const enviar=async()=>{
    if(enviando||enviado)return;
    setEnviando(true);
    await onEnviar({nombre,cursoId,curso:c.label,tipoExamen,titulo:examen?.titulo,
      fecha:new Date().toLocaleString("es-GT"),tipo:"practico",respuestas});
    setEnviado(true);
  };

  if(!examen)return<div style={{color:"#ff8080",padding:40,textAlign:"center"}}>Examen no configurado.</div>;
  if(enviado)return<EnviadoPractico nombre={nombre} cursoId={cursoId}/>;

  return(
    <div style={{minHeight:"100vh",background:`linear-gradient(135deg,#0a0a1a,${c.dark})`}}>
      <TopBar cursoId={cursoId} nombre={nombre} mm={mm} ss={ss} timerColor={tc}/>
      <div style={{background:c.bg,borderBottom:`1px solid ${c.color}44`,padding:"8px 20px"}}>
        <div style={{fontWeight:700,color:c.color,fontSize:13}}>{examen.titulo}</div>
        <div style={{fontSize:11,color:"rgba(255,255,255,0.5)"}}>{examen.subtitulo}</div>
      </div>
      <div style={{maxWidth:820,margin:"0 auto",padding:"24px 20px 80px"}}>

        {/* Aviso */}
        <div style={{background:"rgba(0,212,255,0.08)",border:"1px solid rgba(0,212,255,0.2)",borderRadius:12,padding:"14px 18px",marginBottom:20,fontSize:13,lineHeight:1.7}}>
          <div style={{fontWeight:700,color:"#00d4ff",marginBottom:6}}>💻 ¿Cómo realizar este parcial?</div>
          <div style={{color:"rgba(255,255,255,0.75)"}}>
            1. Lee los incisos en esta pantalla.<br/>
            2. Abre <strong>{examen.programa||"el programa indicado"}</strong> y completa el ejercicio siguiendo cada inciso.<br/>
            3. Al terminar haz clic en <strong>"Confirmar — ya terminé"</strong>.<br/>
            4. Sube tu archivo en la actividad <strong>"{examen.entregable}"</strong> del Portal de Tareas.
          </div>
        </div>

        {/* Tabla de datos si existe */}
        {examen.tabla&&<div style={{...card,marginBottom:20}}>
          <div style={{fontWeight:700,color:c.color,fontSize:13,marginBottom:12}}>{examen.tabla.titulo}</div>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,fontFamily:"monospace"}}>
              <thead><tr>{examen.tabla.headers.map((h,i)=><th key={i} style={{background:"#1a3a1a",color:"#00d4ff",padding:"7px 10px",border:"1px solid rgba(255,255,255,0.1)",textAlign:"center",fontWeight:700,fontSize:11}}>{h}</th>)}</tr></thead>
              <tbody>{examen.tabla.rows.map((row,ri)=><tr key={ri} style={{background:ri%2===0?"rgba(255,255,255,0.03)":"rgba(255,255,255,0.01)"}}>{row.map((cell,ci)=><td key={ci} style={{padding:"6px 10px",border:"1px solid rgba(255,255,255,0.08)",color:ci===0?"rgba(255,255,255,0.5)":typeof cell==="number"?"#fbbf24":cell.toString().startsWith("=")||cell.toString().startsWith("tú")?"#00ff88":"#fff",textAlign:ci===0?"center":"left",fontStyle:cell.toString().startsWith("tú")?"italic":"normal",fontSize:cell.toString().startsWith("=")?"11px":"12px"}}>{cell}</td>)}</tr>)}
              </tbody>
            </table>
          </div>
        </div>}

        {/* Incisos */}
        <div style={{...card,marginBottom:20}}>
          <div style={{fontWeight:700,color:c.color,fontSize:13,marginBottom:14}}>📝 Incisos a realizar</div>
          {examen.incisos.map((inc,i)=>(
            <div key={inc.id} style={{display:"flex",gap:12,marginBottom:14,paddingBottom:14,borderBottom:i<examen.incisos.length-1?"1px solid rgba(255,255,255,0.06)":"none"}}>
              <div style={{width:28,height:28,borderRadius:8,background:`${c.color}22`,border:`1px solid ${c.color}55`,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:13,color:c.color,flexShrink:0}}>{inc.letra.toUpperCase()}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:13,lineHeight:1.6,color:"rgba(255,255,255,0.85)"}}>{inc.txt}</div>
                <div style={{marginTop:6,display:"flex",gap:8,alignItems:"center"}}>
                  <span style={{fontSize:11,background:`${c.color}18`,color:c.color,border:`1px solid ${c.color}33`,borderRadius:6,padding:"2px 8px"}}>{inc.pts} pts</span>
                  <label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",fontSize:12,color:respuestas[inc.id]?"#00ff88":"rgba(255,255,255,0.4)"}}>
                    <input type="checkbox" checked={!!respuestas[inc.id]} onChange={e=>setRespuestas(p=>({...p,[inc.id]:e.target.checked}))} style={{accentColor:"#00ff88",width:14,height:14}}/>
                    {respuestas[inc.id]?"✓ Completado":"Marcar como completado"}
                  </label>
                </div>
              </div>
            </div>
          ))}
        </div>

        {/* Botón */}
        {!confirm?(
          <button onClick={()=>setConfirm(true)} style={{width:"100%",background:`linear-gradient(90deg,${c.color},#7b2ff7)`,border:"none",borderRadius:12,padding:14,color:"#fff",fontWeight:700,fontSize:15,cursor:"pointer"}}>
            ✅ Confirmar — ya terminé
          </button>
        ):(
          <div style={{background:"rgba(255,170,0,0.1)",border:"1px solid rgba(255,170,0,0.4)",borderRadius:12,padding:16,textAlign:"center"}}>
            <div style={{fontSize:14,color:"#ffaa00",marginBottom:6}}>¿Confirmas que ya terminaste el ejercicio?</div>
            <div style={{fontSize:12,color:"rgba(255,255,255,0.5)",marginBottom:14}}>Recuerda subir tu archivo en el Portal de Tareas.</div>
            <div style={{display:"flex",gap:10,justifyContent:"center"}}>
              <button onClick={()=>setConfirm(false)} style={btn()}>Revisar primero</button>
              <button onClick={enviar} disabled={enviando} style={{background:"#00ff88",border:"none",borderRadius:8,padding:"9px 20px",color:"#000",fontWeight:700,cursor:"pointer",fontSize:13}}>
                {enviando?"Registrando...":"Sí, confirmar ✓"}
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function ExamenGenerico({nombre,cursoId,tipoExamen,onEnviar}){
  const c=getCurso(cursoId);const examen=EXAM_MAP[cursoId]?.[tipoExamen];
  const [sec,setSec]=useState(0);const [multiple,setMultiple]=useState({});const [vf,setVf]=useState({});
  const [completar,setCompletar]=useState({});const [desarrollo,setDesarrollo]=useState({});
  const [enviado,setEnviado]=useState(false);const [confirm,setConfirm]=useState(false);const [enviando,setEnviando]=useState(false);
  const {mm,ss,color:tc,agotado}=useTimer(examen?.tiempo||40*60);
  useEffect(()=>{if(agotado&&!enviado)enviar();},[agotado]);
  const enviar=async()=>{if(enviando||enviado)return;setEnviando(true);await onEnviar({nombre,cursoId,curso:c.label,tipoExamen,titulo:examen?.titulo,fecha:new Date().toLocaleString("es-GT"),multiple,vf,completar,desarrollo});setEnviado(true);};
  if(!examen)return<div style={{color:"#ff8080",padding:40,textAlign:"center"}}>Examen no configurado.</div>;
  if(enviado)return<Enviado nombre={nombre}/>;
  const hasDes=examen.desarrollo.length>0;
  const tabs=["Selección Múltiple","Verdadero o Falso","Completar",...(hasDes?["Desarrollo"]:[])];
  const maxSec=tabs.length-1;
  return(
    <div style={{minHeight:"100vh",background:`linear-gradient(135deg,#0a0a1a,${c.dark})`}}>
      <TopBar cursoId={cursoId} nombre={nombre} mm={mm} ss={ss} timerColor={tc}/>
      <ProgBar sec={sec} total={maxSec}/>
      <div style={{background:`${c.bg}`,borderBottom:`1px solid ${c.color}44`,padding:"8px 20px"}}>
        <div style={{fontWeight:700,color:c.color,fontSize:13}}>{examen.titulo}</div>
        <div style={{fontSize:11,color:"rgba(255,255,255,0.5)"}}>{examen.subtitulo}</div>
      </div>
      <TabsBar tabs={tabs} sec={sec} setSec={setSec} color={c.color}/>
      <div style={{maxWidth:800,margin:"0 auto",padding:"20px 20px 100px"}}>
        {sec===0&&<><SecHeader title="Selección Múltiple" pts={`${examen.multiple.length} preguntas · 1 pt c/u`} inst="Selecciona la respuesta correcta." color={c.dark}/>{examen.multiple.map((q,i)=><PregMultiple key={q.id} q={q} qi={i} sel={multiple[q.id]} onSel={v=>setMultiple(p=>({...p,[q.id]:v}))} color={c.color}/>)}</>}
        {sec===1&&<><SecHeader title="Verdadero o Falso" pts={`${examen.vf.length} preguntas · 1 pt c/u`} inst="Selecciona V si es verdadero, F si es falso." color={c.dark}/>{examen.vf.map((q,i)=><PregVF key={q.id} q={q} qi={i} sel={vf[q.id]} onSel={v=>setVf(p=>({...p,[q.id]:v}))}/>)}</>}
        {sec===2&&<><SecHeader title="Completar espacios" pts={`${examen.completar.preguntas.length} preguntas · 1 pt c/u`} inst="Escribe la palabra correcta del banco." color={c.dark}/><BancoPalabras banco={examen.completar.banco}/>{examen.completar.preguntas.map((q,i)=><PregCompletar key={q.id} q={q} qi={i} val={completar[q.id]||""} onChange={v=>setCompletar(p=>({...p,[q.id]:v}))}/>)}{!hasDes&&<BotonEnviar confirm={confirm} setConfirm={setConfirm} enviando={enviando} enviar={enviar}/>}</>}
        {sec===3&&hasDes&&<><SecHeader title="Desarrollo" pts={`${examen.desarrollo.reduce((a,q)=>a+q.pts,0)} pts`} inst="Responde con tus propias palabras." color={c.dark}/>{examen.desarrollo.map((q,i)=>(<div key={q.id} style={{...card,marginBottom:16}}><div style={{fontSize:13,lineHeight:1.6,marginBottom:10}}><span style={{fontWeight:700,color:"#ffaa00"}}>{i+1}. ({q.pts} pts)</span> {q.txt}</div><textarea value={desarrollo[q.id]||""} onChange={e=>setDesarrollo(p=>({...p,[q.id]:e.target.value}))} rows={5} placeholder="Escribe tu respuesta aquí..." style={{width:"100%",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:10,padding:"10px 14px",color:"#fff",fontSize:13,outline:"none",resize:"vertical",lineHeight:1.6}}/><div style={{fontSize:11,color:"rgba(255,255,255,0.3)",textAlign:"right",marginTop:4}}>{(desarrollo[q.id]||"").length} chars</div></div>))}<BotonEnviar confirm={confirm} setConfirm={setConfirm} enviando={enviando} enviar={enviar}/></>}
        <NavBotones sec={sec} setSec={setSec} max={maxSec}/>
      </div>
    </div>
  );
}

function Bloque({title,color,children}){return(<div style={{...card,marginBottom:12}}><div style={{fontWeight:700,fontSize:13,color,marginBottom:10,borderBottom:"1px solid rgba(255,255,255,0.08)",paddingBottom:8}}>{title}</div>{children}</div>);}
function ItemDet({num,txt,ok,resp,correcta}){return(<div style={{padding:"7px 0",borderBottom:"1px solid rgba(255,255,255,0.05)",fontSize:12}}><div style={{color:"rgba(255,255,255,0.7)",marginBottom:3,whiteSpace:"pre-line"}}>{num}. {txt}</div><span style={{color:ok?"#00ff88":"#ff8080"}}>{ok?"✓":"✗"} {resp}</span>{correcta&&<span style={{color:"rgba(255,255,255,0.4)",marginLeft:10}}>→ {correcta}</span>}</div>);}

function DetalleRespuesta({r,onBack}){
  const examen=EXAM_MAP[r.cursoId]?.[r.tipoExamen];const auto=calcAuto(r,examen);const max=maxAuto(examen);const c=getCurso(r.cursoId)||{color:"#aaa"};
  return(<div><button onClick={onBack} style={{...btn(),marginBottom:14}}>← Volver</button><div style={{...card,display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:10,marginBottom:14}}><div><div style={{fontSize:18,fontWeight:800}}>{r.nombre}</div><div style={{fontSize:13,color:"rgba(255,255,255,0.5)"}}>{r.curso} · {r.titulo} · {r.fecha}</div></div><div style={{textAlign:"right"}}><div style={{fontSize:20,fontWeight:800,color:c.color}}>{auto}/{max} <span style={{fontSize:12,color:"rgba(255,255,255,0.4)"}}>pts automáticos</span></div>{examen?.desarrollo.length>0&&<div style={{fontSize:12,color:"rgba(255,255,255,0.4)"}}>+ desarrollo manual</div>}</div></div>
    {examen&&<><Bloque title="Selección Múltiple" color="#00d4ff">{examen.multiple.map((q,i)=>{const resp=r.multiple?.[q.id];const ok=resp===q.correcta;return<ItemDet key={q.id} num={i+1} txt={q.txt} ok={ok} resp={resp!=null?`${["A","B","C","D"][resp]}) ${q.opts[resp]}`:"Sin responder"} correcta={ok?null:`${["A","B","C","D"][q.correcta]}) ${q.opts[q.correcta]}`}/>;})}</Bloque><Bloque title="Verdadero o Falso" color="#a78bff">{examen.vf.map((q,i)=>{const resp=r.vf?.[q.id];const ok=resp===q.correcta;return<ItemDet key={q.id} num={i+1} txt={q.txt} ok={ok} resp={resp==null?"Sin responder":resp?"Verdadero":"Falso"} correcta={ok?null:q.correcta?"Verdadero":"Falso"}/>;})}</Bloque><Bloque title="Completar" color="#ffaa00">{examen.completar.preguntas.map((q,i)=>{const resp=(r.completar?.[q.id]||"").toLowerCase().trim();const ok=resp===q.correcta.toLowerCase();return<ItemDet key={q.id} num={i+1} txt={`${q.pre} ___ ${q.post}`} ok={ok} resp={r.completar?.[q.id]||"Sin responder"} correcta={ok?null:q.correcta}/>;})}</Bloque>{examen.desarrollo.length>0&&<Bloque title="Desarrollo — revisar manualmente" color="#ff8080">{examen.desarrollo.map((q,i)=>(<div key={q.id} style={{padding:"10px 0",borderBottom:"1px solid rgba(255,255,255,0.05)"}}><div style={{fontSize:12,color:"rgba(255,255,255,0.5)",marginBottom:6}}>{i+1}. ({q.pts} pts) {q.txt}</div><div style={{background:"rgba(255,255,255,0.05)",borderRadius:8,padding:"10px 14px",fontSize:13,lineHeight:1.6,whiteSpace:"pre-wrap"}}>{r.desarrollo?.[q.id]||<span style={{color:"rgba(255,255,255,0.3)",fontStyle:"italic"}}>Sin respuesta</span>}</div></div>))}</Bloque>}</>}
  </div>);
}

function PanelMaestro({onSalir}){
  const [respuestas,setRespuestas]=useState([]);const [estado,setEstado]=useState({});const [filtroC,setFiltroC]=useState("todos");const [filtroT,setFiltroT]=useState("todos");const [detalle,setDetalle]=useState(null);const [cargando,setCargando]=useState(true);const [guardando,setGuardando]=useState(false);
  useEffect(()=>{(async()=>{const [r,e]=await Promise.all([leerRespuestas(),leerEstado()]);setRespuestas(r);setEstado(e);setCargando(false);})();},[]);
  const toggleExamen=async(cursoId,tipo)=>{const key=`${cursoId}_${tipo}`;const nuevo={...estado,[key]:!(estado[key]||false)};setGuardando(true);await guardarEstado(nuevo);setEstado(nuevo);setGuardando(false);};
  const filtradas=respuestas.filter(r=>(filtroC==="todos"||r.cursoId===filtroC)&&(filtroT==="todos"||r.tipoExamen===filtroT));
  if(detalle)return(<div style={{minHeight:"100vh",background:"#0d1117",color:"#fff"}}><div style={{background:"rgba(0,0,0,0.5)",borderBottom:"1px solid rgba(255,255,255,0.1)",padding:"12px 24px",display:"flex",justifyContent:"space-between",alignItems:"center"}}><div style={{fontWeight:800,fontSize:16}}>📊 Panel del Catedrático</div><button onClick={onSalir} style={btn()}>← Salir</button></div><div style={{padding:"20px 24px"}}><DetalleRespuesta r={detalle} onBack={()=>setDetalle(null)}/></div></div>);
  
  // Exámenes disponibles por curso incluyendo parcial_u2
  const getTipos = (cid) => (cid==="mad1"||cid==="prog4"||cid==="py5")?["parcial","parcial_u2","final"]:["parcial","final"];
  const getTipoLabel = (tipo) => tipo==="parcial"?"📝 Parcial Unidad I":tipo==="parcial_u2"?"💻 Parcial Unidad II":"📋 Examen Final";

  return(
    <div style={{minHeight:"100vh",background:"#0d1117",color:"#fff"}}>
      <div style={{background:"rgba(0,0,0,0.5)",borderBottom:"1px solid rgba(255,255,255,0.1)",padding:"12px 24px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div><div style={{fontWeight:800,fontSize:16}}>📊 Panel del Catedrático</div><div style={{fontSize:12,color:"rgba(255,255,255,0.4)"}}>{respuestas.length} respuestas{guardando?" · Guardando...":""}</div></div>
        <button onClick={onSalir} style={btn()}>← Salir</button>
      </div>
      <div style={{padding:"20px 24px"}}>
        <div style={{...card,marginBottom:20,border:"1px solid rgba(0,212,255,0.2)"}}>
          <div style={{fontWeight:700,fontSize:14,color:"#00d4ff",marginBottom:14}}>🎛️ Activar / Desactivar exámenes &nbsp;<span style={{fontSize:11,color:"rgba(255,255,255,0.4)",fontWeight:400}}>Solo el examen activo aparece disponible para los alumnos</span></div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:10}}>
            {CURSOS.map(c=>(
              <div key={c.id} style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:10,padding:12}}>
                <div style={{fontSize:12,fontWeight:700,color:c.color,marginBottom:8}}>{c.label}</div>
                {getTipos(c.id).map(tipo=>{
                  const activo=estado[`${c.id}_${tipo}`]||false;const examen=EXAM_MAP[c.id]?.[tipo];
                  return(<div key={tipo} style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
                    <div><div style={{fontSize:12,color:activo?"#fff":"rgba(255,255,255,0.5)"}}>{getTipoLabel(tipo)}</div><div style={{fontSize:10,color:"rgba(255,255,255,0.3)"}}>{examen?.subtitulo||"—"}</div></div>
                    <button onClick={()=>toggleExamen(c.id,tipo)} style={{background:activo?"rgba(0,255,136,0.2)":"rgba(255,255,255,0.08)",border:activo?"1px solid #00ff88":"1px solid rgba(255,255,255,0.15)",borderRadius:20,padding:"4px 12px",color:activo?"#00ff88":"rgba(255,255,255,0.5)",cursor:"pointer",fontSize:12,fontWeight:700,minWidth:80}}>
                      {activo?"🟢 Activo":"⚫ Cerrado"}
                    </button>
                  </div>);
                })}
              </div>
            ))}
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:16}}>
          {[{label:"Total enviados",val:respuestas.length,color:"#00d4ff"},{label:"Parciales",val:respuestas.filter(r=>r.tipoExamen==="parcial"||r.tipoExamen==="parcial_u2").length,color:"#a78bff"},{label:"Finales",val:respuestas.filter(r=>r.tipoExamen==="final").length,color:"#00ff88"},{label:"Exámenes activos",val:Object.values(estado).filter(Boolean).length,color:"#ffaa00"}].map(s=>(<div key={s.label} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:12,padding:"12px",textAlign:"center"}}><div style={{fontSize:20,fontWeight:800,color:s.color}}>{s.val}</div><div style={{fontSize:11,color:"rgba(255,255,255,0.4)",marginTop:3}}>{s.label}</div></div>))}
        </div>
        <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap"}}>
          <button onClick={()=>setFiltroC("todos")} style={{background:filtroC==="todos"?"rgba(0,212,255,0.15)":"rgba(255,255,255,0.05)",border:filtroC==="todos"?"1px solid #00d4ff":"1px solid rgba(255,255,255,0.1)",borderRadius:20,padding:"6px 14px",color:filtroC==="todos"?"#00d4ff":"rgba(255,255,255,0.6)",cursor:"pointer",fontSize:12}}>Todos ({respuestas.length})</button>
          {CURSOS.map(c=><button key={c.id} onClick={()=>setFiltroC(c.id)} style={{background:filtroC===c.id?c.bg:"rgba(255,255,255,0.05)",border:filtroC===c.id?`1px solid ${c.color}`:"1px solid rgba(255,255,255,0.1)",borderRadius:20,padding:"6px 14px",color:filtroC===c.id?c.color:"rgba(255,255,255,0.6)",cursor:"pointer",fontSize:12}}>{c.label.split("—")[1]?.trim()||c.label} ({respuestas.filter(r=>r.cursoId===c.id).length})</button>)}
        </div>
        <div style={{display:"flex",gap:8,marginBottom:16}}>
          {[["todos","Todos"],["parcial","📝 Parciales U.I"],["parcial_u2","💻 Parciales U.II"],["final","📋 Finales"]].map(([v,l])=><button key={v} onClick={()=>setFiltroT(v)} style={{background:filtroT===v?"rgba(167,139,250,0.15)":"rgba(255,255,255,0.05)",border:filtroT===v?"1px solid #a78bff":"1px solid rgba(255,255,255,0.1)",borderRadius:20,padding:"5px 12px",color:filtroT===v?"#a78bff":"rgba(255,255,255,0.6)",cursor:"pointer",fontSize:12}}>{l}</button>)}
        </div>
        {cargando?<div style={{textAlign:"center",padding:40,color:"rgba(255,255,255,0.4)"}}>Cargando...</div>:filtradas.length===0?<div style={{textAlign:"center",padding:40,color:"rgba(255,255,255,0.3)"}}><div style={{fontSize:36,marginBottom:8}}>📭</div><div>No hay respuestas con estos filtros.</div></div>:(
          <div>
            <div style={{display:"grid",gridTemplateColumns:"2fr 2fr 1fr 1fr 1fr 70px",gap:8,padding:"6px 12px",fontSize:11,color:"rgba(255,255,255,0.4)",fontWeight:700,textTransform:"uppercase"}}><span>Alumno</span><span>Curso</span><span>Tipo</span><span>Hora</span><span>Auto</span><span></span></div>
            {filtradas.map((r,i)=>{
              const c=getCurso(r.cursoId)||{color:"#aaa",label:r.curso||"—",bg:"rgba(255,255,255,0.08)"};
              const examen=EXAM_MAP[r.cursoId]?.[r.tipoExamen];const auto=calcAuto(r,examen);const max=maxAuto(examen);const pct=max>0?Math.round((auto/max)*100):0;
              const tipoLabel=r.tipoExamen==="parcial"?"P.U.I":r.tipoExamen==="parcial_u2"?"P.U.II 💻":"Final";
              const tipoBg=r.tipoExamen==="parcial"?"rgba(167,139,250,0.15)":r.tipoExamen==="parcial_u2"?"rgba(247,151,30,0.15)":"rgba(0,255,136,0.1)";
              const tipoColor=r.tipoExamen==="parcial"?"#a78bff":r.tipoExamen==="parcial_u2"?"#f7971e":"#00ff88";
              return(<div key={i} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:10,padding:"10px 12px",display:"grid",gridTemplateColumns:"2fr 2fr 1fr 1fr 1fr 70px",gap:8,alignItems:"center",marginBottom:6}}>
                <span style={{fontWeight:600,fontSize:13}}>{r.nombre||"—"}</span>
                <span style={{fontSize:11,color:c.color,background:c.bg,borderRadius:6,padding:"2px 8px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.label.split("—")[1]?.trim()||c.label}</span>
                <span style={{fontSize:11,background:tipoBg,color:tipoColor,borderRadius:6,padding:"2px 8px",textAlign:"center"}}>{tipoLabel}</span>
                <span style={{fontSize:11,color:"rgba(255,255,255,0.4)"}}>{(r.fecha||"").split(",")[1]||(r.fecha||"")}</span>
                <span style={{fontSize:13,fontWeight:700,color:pct>=70?"#00ff88":pct>=50?"#ffaa00":"#ff8080"}}>{auto}/{max}</span>
                <button onClick={()=>setDetalle(r)} style={{...btn({padding:"5px 10px",fontSize:12}),color:"#00d4ff",borderColor:"rgba(0,212,255,0.3)",background:"rgba(0,212,255,0.1)"}}>Ver →</button>
              </div>);
            })}
          </div>
        )}
      </div>
    </div>
  );
}

function Login({onStart}){
  const [nombre,setNombre]=useState("");const [cursoId,setCursoId]=useState("");const [pass,setPass]=useState("");const [modo,setModo]=useState("alumno");const [err,setErr]=useState("");const [estado,setEstado]=useState({});const [cargando,setCargando]=useState(true);
  useEffect(()=>{leerEstado().then(e=>{setEstado(e);setCargando(false);});},[]);

  const TIPO_LABEL={parcial:"📝 Parcial U.I",parcial_u2:"📝 Parcial Unidad II",final:"📋 Examen Final"};

  const submit=()=>{
    if(modo==="maestro"){if(pass!==PASS_MAESTRO)return setErr("Contraseña incorrecta.");return onStart("__MAESTRO__","maestro","maestro");}
    if(!nombre.trim())return setErr("Escribe tu nombre completo.");
    if(!cursoId)return setErr("Selecciona tu curso.");
    // Buscar cualquier tipo activo para el curso (parcial, parcial_u2, final)
    const tipos=["parcial","parcial_u2","final"];
    const tipo=tipos.find(t=>estado[`${cursoId}_${t}`]);
    if(!tipo)return setErr("No hay ningún examen activo para tu curso en este momento.");
    setErr("");onStart(nombre.trim(),cursoId,tipo);
  };

  const cursosConExamen=CURSOS.filter(c=>["parcial","parcial_u2","final"].some(t=>estado[`${c.id}_${t}`]));

  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0a0a1a,#0a1628)",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:20,padding:"40px 36px",width:"100%",maxWidth:500,color:"#fff"}}>
        <div style={{textAlign:"center",marginBottom:24}}><div style={{fontSize:38,marginBottom:8}}>🏫</div><div style={{fontSize:12,color:"rgba(255,255,255,0.4)"}}>Liceo Santa María · Ciclo 2026</div><h1 style={{fontSize:22,fontWeight:800,background:"linear-gradient(90deg,#00d4ff,#7b2ff7)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",margin:"6px 0"}}>Plataforma de Exámenes</h1></div>
        <div style={{display:"flex",gap:6,marginBottom:20,background:"rgba(255,255,255,0.05)",borderRadius:10,padding:4}}>{["alumno","maestro"].map(m=><button key={m} onClick={()=>{setModo(m);setErr("");}} style={{flex:1,background:modo===m?"rgba(0,212,255,0.2)":"transparent",border:modo===m?"1px solid rgba(0,212,255,0.4)":"1px solid transparent",borderRadius:8,padding:"7px",color:modo===m?"#00d4ff":"rgba(255,255,255,0.5)",cursor:"pointer",fontSize:13,fontWeight:modo===m?700:400}}>{m==="alumno"?"👨‍🎓 Alumno":"👩‍🏫 Maestro"}</button>)}</div>
        {modo==="alumno"?(<>
          <div style={{marginBottom:14}}><label style={{fontSize:12,color:"rgba(255,255,255,0.6)",display:"block",marginBottom:6}}>Nombre completo</label><input value={nombre} onChange={e=>setNombre(e.target.value)} placeholder="Ej: María García López" style={{width:"100%",background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:10,padding:"10px 14px",color:"#fff",fontSize:14,outline:"none"}}/></div>
          <div style={{marginBottom:12}}><label style={{fontSize:12,color:"rgba(255,255,255,0.6)",display:"block",marginBottom:6}}>Selecciona tu curso</label>
            {cargando?<div style={{fontSize:13,color:"rgba(255,255,255,0.4)",textAlign:"center",padding:12}}>Verificando exámenes disponibles...</div>
            :cursosConExamen.length===0?<div style={{background:"rgba(255,170,0,0.1)",border:"1px solid rgba(255,170,0,0.3)",borderRadius:10,padding:"12px 16px",fontSize:13,color:"#ffaa00",textAlign:"center"}}>⏳ No hay exámenes activos en este momento.<br/><span style={{fontSize:12,opacity:.7}}>Tu catedrático activará el examen cuando sea el momento.</span></div>
            :<div style={{display:"flex",flexDirection:"column",gap:8}}>{cursosConExamen.map(c=>{
              const tipos=["parcial","parcial_u2","final"];
              const tipo=tipos.find(t=>estado[`${c.id}_${t}`]);
              const examen=EXAM_MAP[c.id]?.[tipo];
              return(<button key={c.id} onClick={()=>setCursoId(c.id)} style={{background:cursoId===c.id?c.bg:"rgba(255,255,255,0.04)",border:`1px solid ${cursoId===c.id?c.color:"rgba(255,255,255,0.1)"}`,borderRadius:10,padding:"10px 16px",color:cursoId===c.id?c.color:"rgba(255,255,255,0.7)",cursor:"pointer",fontSize:13,textAlign:"left",fontWeight:cursoId===c.id?700:400,transition:"all .2s"}}><div>{c.label}</div><div style={{fontSize:11,opacity:.7,marginTop:2}}>{TIPO_LABEL[tipo]||tipo} · {examen?.subtitulo}</div></button>);
            })}</div>}
          </div>
        </>):<div style={{marginBottom:18}}><label style={{fontSize:12,color:"rgba(255,255,255,0.6)",display:"block",marginBottom:6}}>Contraseña del catedrático</label><input type="password" value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()} placeholder="••••••••" style={{width:"100%",background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:10,padding:"10px 14px",color:"#fff",fontSize:14,outline:"none"}}/></div>}
        {err&&<div style={{background:"rgba(255,80,80,0.15)",border:"1px solid rgba(255,80,80,0.3)",borderRadius:8,padding:"8px 12px",fontSize:12,color:"#ff8080",marginBottom:12}}>{err}</div>}
        <button onClick={submit} disabled={modo==="alumno"&&cargando} style={{width:"100%",background:"linear-gradient(90deg,#00d4ff,#7b2ff7)",border:"none",borderRadius:12,padding:"12px",color:"#fff",fontWeight:700,fontSize:15,cursor:"pointer",marginTop:6,opacity:modo==="alumno"&&cargando?0.5:1}}>{modo==="alumno"?"Iniciar examen →":"Entrar al panel →"}</button>
      </div>
    </div>
  );
}

function App(){
  const [vista,setVista]=useState("login");const [usuario,setUsuario]=useState(null);
  const handleStart=(nombre,cursoId,tipo)=>{if(nombre==="__MAESTRO__"){setVista("maestro");return;}setUsuario({nombre,cursoId,tipo});setVista("examen");};
  const handleEnviar=async resp=>{await guardarRespuesta(resp);};
  if(vista==="examen"&&usuario){
    const exDef=EXAM_MAP[usuario.cursoId]?.[usuario.tipo];
    if(exDef?.tipo==="practico")return<ExamenPractico nombre={usuario.nombre} cursoId={usuario.cursoId} tipoExamen={usuario.tipo} onEnviar={handleEnviar}/>;
    return<ExamenGenerico nombre={usuario.nombre} cursoId={usuario.cursoId} tipoExamen={usuario.tipo} onEnviar={handleEnviar}/>;
  }
  if(vista==="maestro")return<PanelMaestro onSalir={()=>setVista("login")}/>;
  return<Login onStart={handleStart}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
